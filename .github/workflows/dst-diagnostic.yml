# .github/workflows/dst-diagnostic.yml
#
# DST Diagnostic v4 — runs on every PR and push
# Posts a structural health report as a PR comment
#
# DST Framework: ρ heals · κ hides · σ kills
# SSRN 6434119 · Idan Rephiah · 2026
#
# ── QUICK START ──────────────────────────────────────────────────────────────
# 1. Copy dst-scanner.js and dst-action.js to your repo root
# 2. Copy this file to .github/workflows/dst-diagnostic.yml
# 3. Push. DST runs on the next PR automatically.
#
# ── WHAT YOU GET ON EVERY PR ─────────────────────────────────────────────────
#
#   Θ (real remaining capacity)      — the actual structural health
#   Apparent health                  — what your metrics show
#   Observability gap                — how much your metrics are lying
#   dΘ/dt (trajectory)               — are you improving or declining?
#   Regime prediction                — sprints until next regime transition
#   Rewrite signal                   — Proposition 5: when local fixes stop working
#   Three action lists               — Fix κ_a / Mitigate κ_c / Accept κ_i
#   Annual cost of κ                 — dollar cost of structural debt
#
# ── OPTIONAL CONFIG ──────────────────────────────────────────────────────────
# Set these in: repo → Settings → Secrets and variables → Actions → Variables
#
#   DST_TEAM_SIZE       — number of engineers           (default: 10)
#   DST_ENGINEER_COST   — annual cost per engineer USD  (default: 150000)
#   DST_SCAN_DIR        — directory to scan             (default: . = whole repo)
#   DST_FAIL_SCORE      — fail CI if Θ below this       (default: 0 = never fail)
#   DST_FAIL_RISK       — fail CI if risk score above   (default: 0 = never fail)
#   DST_DATA_SCALE      — small/medium/large/hyperscale (default: medium)
#   DST_HOURS_RETRY     — ROI multiplier: retry hours   (default: 4)
#   DST_HOURS_ERROR     — ROI multiplier: error hours   (default: 6)
#   DST_HOURS_GOD       — ROI multiplier: god fn hours  (default: 8)
#   DST_HOURS_STATE     — ROI multiplier: state hours   (default: 3)
#   DST_HOURS_NPLUS     — ROI multiplier: N+1 hours     (default: 5)
#
# ── REGIME REFERENCE ─────────────────────────────────────────────────────────
#
#   Elastic     (Θ 75-100)  Healthy. Features are fast to add.
#   Plastic     (Θ 50-74)   Working via masking. Capacity declining.
#   Late Plastic (Θ 25-49)  Significant κ. Each feature costs more.
#   Residual    (Θ 0-24)    Delayed failure. Fix before adding anything.
#
# ─────────────────────────────────────────────────────────────────────────────

name: DST Diagnostic

on:
  pull_request:
    branches: [ main, master, develop ]
    types: [ opened, synchronize, reopened ]
  push:
    branches: [ main, master ]
  workflow_dispatch:  # allow manual trigger from GitHub Actions tab

permissions:
  contents: write     # needed to save trend artifact
  pull-requests: write
  issues: write

jobs:
  dst-scan:
    name: "DST Structural Analysis"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for trend tracking

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Download previous trend artifact for dΘ/dt calculation
      - name: Download previous DST trend
        uses: dawidd6/action-download-artifact@v3
        continue-on-error: true  # first run has no previous artifact
        with:
          name: dst-trend
          path: .
          if_no_artifact_found: ignore

      - name: Run DST Diagnostic
        env:
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
          PR_NUMBER:          ${{ github.event.pull_request.number }}
          BASE_SHA:           ${{ github.event.pull_request.base.sha }}
          HEAD_SHA:           ${{ github.event.pull_request.head.sha }}
          # Team context
          DST_SCAN_DIR:       ${{ vars.DST_SCAN_DIR        || '.' }}
          DST_TEAM_SIZE:      ${{ vars.DST_TEAM_SIZE        || '10' }}
          DST_ENGINEER_COST:  ${{ vars.DST_ENGINEER_COST    || '150000' }}
          DST_ARTIFACT_DIR:   '.'
          # Governance
          DST_FAIL_SCORE:     ${{ vars.DST_FAIL_SCORE       || '0' }}
          DST_FAIL_RISK:      ${{ vars.DST_FAIL_RISK        || '0' }}
          # ROI multipliers (optional — override default hours per finding)
          DST_HOURS_RETRY:    ${{ vars.DST_HOURS_RETRY      || '4' }}
          DST_HOURS_ERROR:    ${{ vars.DST_HOURS_ERROR      || '6' }}
          DST_HOURS_GOD:      ${{ vars.DST_HOURS_GOD        || '8' }}
          DST_HOURS_STATE:    ${{ vars.DST_HOURS_STATE      || '3' }}
          DST_HOURS_NPLUS:    ${{ vars.DST_HOURS_NPLUS      || '5' }}
        run: node dst-action.js

      # Save trend data for next run (enables dΘ/dt calculation)
      - name: Save DST trend artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dst-trend
          path: .dst-trend.json
          retention-days: 90
          overwrite: true

      # Save full report for audit trail
      - name: Upload DST report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dst-report-${{ github.run_number }}
          path: |
            .dst-trend.json
          retention-days: 30
